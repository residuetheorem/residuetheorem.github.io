<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 26th Birthday 🦋</title>
    <meta name="theme-color" content="#f8f5f3">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Nunito:wght@400;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', 'Nunito', 'Comfortaa', Arial, sans-serif;
            background: #f8f5f3;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(245, 222, 179, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(245, 222, 179, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(245, 222, 179, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 60% 60%, rgba(245, 222, 179, 0.2) 0%, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><g id="butterfly"><path d="M50 30 Q45 25 35 30 Q30 35 35 40 Q40 35 45 35 Q50 40 55 35 Q60 35 65 40 Q70 35 65 30 Q55 25 50 30 Z" fill="rgba(245,222,179,0.6)" stroke="rgba(245,222,179,0.8)" stroke-width="0.5"/><path d="M50 35 Q45 40 35 45 Q30 50 35 55 Q40 50 45 50 Q50 55 55 50 Q60 50 65 55 Q70 50 65 45 Q55 40 50 35 Z" fill="rgba(245,222,179,0.4)" stroke="rgba(245,222,179,0.6)" stroke-width="0.5"/><circle cx="50" cy="40" r="1" fill="rgba(245,222,179,0.9)"/></g></defs><use href="%23butterfly" x="0" y="0" opacity="0.7"/><use href="%23butterfly" x="60" y="30" opacity="0.5" transform="scale(0.8)"/><use href="%23butterfly" x="20" y="60" opacity="0.6" transform="scale(0.9)"/></svg>');
            background-size: 120px 120px;
            animation: butterflyFloat 25s ease-in-out infinite;
        }

        @keyframes butterflyFloat {
            0% { background-position: 0 0, 100px 100px, 50px 150px, 150px 50px; }
            50% { background-position: 20px 20px, 120px 120px, 70px 170px, 170px 70px; }
            100% { background-position: 0 0, 100px 100px, 50px 150px, 150px 50px; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            text-align: center;
            width: 100%;
                font-family: 'Quicksand', 'Nunito', 'Comfortaa', Arial, sans-serif;
        }

        .birthday-header {
            background: linear-gradient(135deg, #f8f5f3 0%, rgba(255, 255, 255, 0.95) 100%);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 15px 40px rgba(159, 175, 160, 0.2);
            border: 2px solid rgba(159, 175, 160, 0.2);
            animation: gentleBounce 4s ease-in-out infinite;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .birthday-header h1 {
            font-size: 3.5em;
            color: #9fafa0;
            margin-bottom: 15px;
            font-weight: 400;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .sweet-message {
            font-size: 1.4em;
            color: #d4a8a8;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .age-counter {
            font-size: 5em;
            font-weight: 300;
            color: #9fafa0;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            animation: gentlePulse 3s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        
        .lovely-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 245, 243, 0.9) 100%);
            border-radius: 20px;
            padding: 35px;
            margin: 30px 0;
            box-shadow: 0 10px 25px rgba(159, 175, 160, 0.15);
            border: 2px solid rgba(212, 168, 168, 0.2);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }

        .lovely-section:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(159, 175, 160, 0.25);
        }

        .lovely-btn {
            background: linear-gradient(135deg, #9fafa0 0%, #d4a8a8 100%);
            color: #fff;
            border: none;
            padding: 18px 35px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(159, 175, 160, 0.3);
                font-family: 'Quicksand', 'Nunito', 'Comfortaa', Arial, sans-serif;
            font-weight: 400;
            position: relative;
            z-index: 1;
            outline: none;
        }

        .lovely-btn:focus {
            outline: 2px solid #d4a8a8;
            outline-offset: 2px;
        }

        .lovely-btn:hover {
            background: linear-gradient(135deg, #8a9b8b 0%, #c69595 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(159, 175, 160, 0.4);
        }

        .birthday-wishes {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 245, 243, 0.95) 50%, rgba(252, 238, 238, 0.95) 100%);
            border-radius: 25px;
            padding: 40px;
            margin: 40px 0;
            box-shadow: 0 10px 30px rgba(159, 175, 160, 0.2);
            border: 2px solid rgba(212, 168, 168, 0.3);
            position: relative;
        }

        .birthday-cake {
            font-size: 4em;
            margin: 25px 0;
            animation: gentleWiggle 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes gentleWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-1deg); }
            75% { transform: rotate(1deg); }
        }

        .heartfelt-message {
            font-size: 1.3em;
            color: #9fafa0;
            line-height: 1.8;
            margin: 25px 0;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .particle {
            position: fixed;
            top: -50px;
            animation-name: gentleFall;
            animation-timing-function: linear;
            animation-iteration-count: 1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .emoji-rain {
            font-size: 2em;
            z-index: 1000;
        }

        .confetti-piece {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 999;
        }

        @keyframes gentleFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .love-note {
            background: linear-gradient(135deg, rgba(248, 245, 243, 0.95) 0%, rgba(252, 238, 238, 0.95) 100%);
            border: 2px solid rgba(212, 168, 168, 0.4);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            font-size: 1.2em;
            color: #9fafa0;
            font-style: italic;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .signature {
            font-size: 1.1em;
            color: #d4a8a8;
            margin-top: 30px;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .floating-butterfly {
            font-size: 2em;
            z-index: 500;
            animation-name: butterflyFlight;
        }

        @keyframes butterflyFlight {
            0% { transform: translateX(-100px) translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(-20px) rotate(360deg); opacity: 0; }
        }

        .special-message-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 245, 243, 0.98) 50%, rgba(252, 238, 238, 0.98) 100%);
            border: 3px solid rgba(212, 168, 168, 0.6);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            font-size: 1.3em;
            color: #9fafa0;
            z-index: 10000;
            box-shadow: 0 15px 50px rgba(159, 175, 160, 0.3);
                font-family: 'Quicksand', 'Nunito', 'Comfortaa', Arial, sans-serif;
            line-height: 1.6;
        }

        .special-message-popup button {
            background: linear-gradient(135deg, #9fafa0 0%, #d4a8a8 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
                font-family: 'Quicksand', 'Nunito', 'Comfortaa', Arial, sans-serif;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(159, 175, 160, 0.3);
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .birthday-header { padding: 18px; margin-bottom: 18px; }
            .birthday-header h1 { font-size: 2em; letter-spacing: 1px; }
            .sweet-message { font-size: 1em; }
            .age-counter { font-size: 2.5em; }
            .lovely-btn { padding: 12px 18px; font-size: 1em; min-width: 120px; }
            .birthday-wishes { padding: 18px; margin: 18px 0; }
            .birthday-wishes h2 { font-size: 1.5em !important; }
            .heartfelt-message { font-size: 1em; }
            .love-note { font-size: 0.95em; padding: 12px; }
            .special-message-popup { padding: 12px; font-size: 1em; }
            .background-overlay { background-size: 80px 80px; }
        }

        @media (max-width: 480px) {
            .container { padding: 5px; }
            .birthday-header { padding: 10px; margin-bottom: 10px; }
            .birthday-header h1 { font-size: 1.3em; letter-spacing: 0.5px; }
            .sweet-message { font-size: 0.9em; }
            .age-counter { font-size: 2em; }
            .birthday-wishes h2 { font-size: 1.2em !important; }
            .lovely-btn { padding: 8px 12px; font-size: 0.95em; min-width: 100px; }
            .special-message-popup { padding: 8px; font-size: 0.95em; }
            .background-overlay { background-size: 50px 50px; }
        }
    </style>
</head>
<body>
    <div class="background-overlay" aria-hidden="true"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>
    <main class="container">
        <section class="birthday-header" aria-label="Birthday Header">
            <h1 tabindex="0">🦋Happy 26th, beautiful!</h1>
            <div class="sweet-message">
            
            </div>
            <div class="age-counter" aria-live="polite"></div>
          
        </section>

        <section class="lovely-section" aria-label="Joy Section">
            <div class="love-note">
               Dumdum, may your days be as wholesome as you are..
            </div>
            <button class="lovely-btn" onclick="makeFlowersRain()" aria-label="Bloom with Joy">
                💕 Click this button 
            </button>
        </section>
        
        <section class="birthday-wishes" aria-label="Birthday Wishes">
            <div class="birthday-cake" aria-hidden="true"></div>
            <button class="lovely-btn" onclick="showLoveMessage()" style="font-size: 1.2em; margin-top: 18px;" aria-label="Special Message">
                🌸 You have received a Message
            </button>
            <div class="signature">
                Hugs,<br>
                Anuj 🦋
            </div>
        </section>
    </main>

    <script>

        function isMobile() {
            return window.innerWidth <= 768;
        }

        function createParticle(type, content, duration) {
            const particle = document.createElement('div');
            particle.className = `particle ${type}`;
            particle.innerHTML = content;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${Math.random() * 2}s`;
            document.body.appendChild(particle);
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
            return particle;
        }

        function makeFlowersRain() {
            const flowers = ['🌸', '🌺', '🌻', '🌷', '🌹', '💐', '🌼', '🦋', '🌿'];
            const count = isMobile() ? 10 : 20;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const flowerContent = flowers[Math.floor(Math.random() * flowers.length)];
                    const duration = Math.random() * 3 + (isMobile() ? 3 : 4);
                    createParticle('emoji-rain', flowerContent, duration);
                }, i * 200);
            }
        }

        function showLoveMessage() {
            createGentleConfetti(isMobile() ? 15 : 30);
            createButterflies(isMobile() ? 2 : 3);
            setTimeout(() => {
                const messages = [
                    "🦋 Hi!!! Sheetal. You are such a rare and beautiful soul. You brighten everyone's day! and um, The world feels like a better place because you're in it 💕 OMGGG",
                  
                ];
                const randomMessage = messages[Math.floor(Math.random() * messages.length)];
                const existingPopup = document.querySelector('.special-message-popup');
                if (existingPopup) {
                    existingPopup.remove();
                }
                const messageDiv = document.createElement('div');
                messageDiv.className = 'special-message-popup';
                messageDiv.setAttribute('role', 'dialog');
                messageDiv.setAttribute('aria-modal', 'true');
                messageDiv.innerHTML = `
                    ${randomMessage}
                    <br><br>
                    <button onclick="this.parentElement.remove()" aria-label="Close popup">💕 Yes I'm smiling!</button>
                `;
                document.body.appendChild(messageDiv);
                setTimeout(() => {
                    if (messageDiv.parentElement) {
                        messageDiv.remove();
                    }
                }, 8000);
            }, 500);
        }

        function createGentleConfetti(count) {
            const colors = ['#9fafa0', '#d4a8a8', '#f8f5f3', '#f5deb3', '#fceaea'];
            const confettiContainer = document.getElementById('confetti');
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'particle confetti-piece';
                    confetti.style.left = `${Math.random() * 100}%`;
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 4 + (isMobile() ? 3 : 5);
                    confetti.style.animationDuration = `${duration}s`;
                    confetti.style.animationDelay = `${Math.random() * 2}s`;
                    confettiContainer.appendChild(confetti);
                    setTimeout(() => {
                        confetti.remove();
                    }, duration * 1000);
                }, i * 150);
            }
        }

        function createButterflies(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const duration = Math.random() * 4 + (isMobile() ? 6 : 8);
                    const butterfly = createParticle('floating-butterfly', '🦋', duration);
                    if (butterfly) {
                         butterfly.style.top = `${Math.random() * 70 + 15}%`;
                    }
                }, i * 2500);
            }
        }


        setTimeout(makeFlowersRain, 1500);
        setTimeout(() => createButterflies(isMobile() ? 1 : 2), 3000);
       
        setInterval(() => createGentleConfetti(isMobile() ? 2 : 5), 15000);
        setInterval(() => createButterflies(1), 20000);

    </script>
</body>
</html>
