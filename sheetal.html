<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shital 🦋</title>
    <meta name="theme-color" content="#f8f5f3">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Nunito:wght@400;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', 'Nunito', 'Comfortaa', Arial, sans-serif;
            background-color: #f8f5f3;
            background-image: radial-gradient(circle at 30% 30%, rgba(245, 222, 179, 0.25) 0%, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150"><defs><g id="butterfly"><path d="M50 30 Q45 25 35 30 Q30 35 35 40 Q40 35 45 35 Q50 40 55 35 Q60 35 65 40 Q70 35 65 30 Q55 25 50 30 Z" fill="rgba(212,168,168,0.4)"/><path d="M50 35 Q45 40 35 45 Q30 50 35 55 Q40 50 45 50 Q50 55 55 50 Q60 50 65 55 Q70 50 65 45 Q55 40 50 35 Z" fill="rgba(212,168,168,0.2)"/></g></defs><use href="%23butterfly" x="5" y="15" opacity="0.7" transform="scale(0.6) rotate(-10)"/><use href="%23butterfly" x="70" y="20" opacity="0.5" transform="scale(0.8) rotate(5)"/><use href="%23butterfly" x="40" y="50" opacity="0.6" transform="scale(0.5) rotate(15)"/><use href="%23butterfly" x="110" y="80" opacity="0.4" transform="scale(0.9) rotate(-5)"/><use href="%23butterfly" x="15" y="105" opacity="0.6" transform="scale(0.7) rotate(20)"/><use href="%23butterfly" x="90" y="120" opacity="0.5" transform="scale(0.6) rotate(-15)"/></svg>');
            background-repeat: repeat;
            background-size: 150px 150px;
            opacity: 0.7;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            text-align: center;
            width: 100%;
        }
        
        /* Card base styles for sequential loading */
        .card {
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, transform;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .birthday-header {
            background: rgba(248, 245, 243, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 15px 40px rgba(159, 175, 160, 0.2);
            border: 1px solid rgba(159, 175, 160, 0.2);
            animation: gentleBounce 5s ease-in-out infinite;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .birthday-header h1 {
            font-size: 3.5em;
            color: #9fafa0;
            margin-bottom: 15px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .sweet-message {
            font-size: 1.4em;
            color: #d4a8a8;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .age-counter {
            font-size: 5em;
            font-weight: 300;
            color: #9fafa0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            animation: gentlePulse 3s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        
        .lovely-section {
            background: rgba(248, 245, 243, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 35px;
            margin: 30px 0;
            box-shadow: 0 10px 25px rgba(159, 175, 160, 0.15);
            border: 1px solid rgba(212, 168, 168, 0.2);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }

        .lovely-section:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(159, 175, 160, 0.2);
        }

        .lovely-btn {
            background: linear-gradient(135deg, #9fafa0 0%, #d4a8a8 100%);
            color: #fff;
            border: none;
            padding: 18px 35px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(159, 175, 160, 0.3);
            font-weight: 600;
            position: relative;
            z-index: 1;
            outline: none;
        }

        .lovely-btn:focus-visible {
            box-shadow: 0 0 0 3px #f8f5f3, 0 0 0 5px #d4a8a8;
        }

        .lovely-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(159, 175, 160, 0.4);
        }

        .birthday-wishes {
            background: rgba(248, 245, 243, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 25px;
            padding: 40px;
            margin: 40px 0;
            box-shadow: 0 10px 30px rgba(159, 175, 160, 0.2);
            border: 1px solid rgba(212, 168, 168, 0.3);
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background-color: #d4a8a8;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(212, 168, 168, 0.7);
            animation: pulseBadge 2s infinite ease-in-out;
            z-index: 2;
            transition: opacity 0.3s ease;
        }

        @keyframes pulseBadge {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .birthday-cake {
            font-size: 4em;
            margin: 25px 0;
            animation: gentleWiggle 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes gentleWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-1.5deg); }
            75% { transform: rotate(1.5deg); }
        }
        
        .love-note {
            background: linear-gradient(135deg, rgba(248, 245, 243, 0.95) 0%, rgba(252, 238, 238, 0.95) 100%);
            border: 1px solid rgba(212, 168, 168, 0.4);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            font-size: 1.2em;
            color: #9fafa0;
            font-style: italic;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .signature {
            font-size: 1.1em;
            color: #d4a8a8;
            margin-top: 30px;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .particle {
            position: absolute;
            top: -50px;
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity;
        }
        
        .particle.animate {
            animation-name: gentleFall;
            animation-timing-function: linear;
        }

        .emoji-rain { font-size: 2em; }
        .confetti-piece { width: 8px; height: 8px; border-radius: 50%; }
        .floating-butterfly { font-size: 2em; animation-name: butterflyFlight; }

        @keyframes gentleFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        
        @keyframes butterflyFlight {
            0% { transform: translateX(-100px) translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(-20px) rotate(360deg); opacity: 0; }
        }

        .special-message-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 168, 168, 0.6);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            font-size: 1.3em;
            color: #9fafa0;
            z-index: 10000;
            box-shadow: 0 15px 50px rgba(159, 175, 160, 0.3);
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .birthday-header { padding: 30px; margin-bottom: 30px; }
            .birthday-header h1 { font-size: 2.5em; }
            .sweet-message { font-size: 1.1em; }
            .age-counter { font-size: 4em; }
            .lovely-btn { padding: 15px 30px; font-size: 1.1em; }
            .birthday-wishes, .lovely-section { padding: 30px; margin: 25px 0; }
            .love-note { font-size: 1em; padding: 20px; }
            .special-message-popup { padding: 30px; font-size: 1.1em; }
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .birthday-header { padding: 25px; margin-bottom: 25px; }
            .birthday-header h1 { font-size: 2em; }
            .sweet-message { font-size: 1em; }
            .age-counter { font-size: 3.5em; }
            .lovely-btn { padding: 14px 25px; font-size: 1em; }
            .birthday-wishes, .lovely-section { padding: 25px; margin: 20px 0; }
            .special-message-popup { padding: 25px; }
            .notification-badge { width: 24px; height: 24px; font-size: 14px; top: -8px; right: -8px; }
        }
    </style>
</head>
<body>
    <div class="background-overlay" aria-hidden="true"></div>
    <div class="particle-container" id="particle-container" aria-hidden="true"></div>
    
    <main class="container">
        <section class="birthday-header card" aria-label="Birthday Header">
            <h1 tabindex="0">🦋Happy 26th, beautiful!</h1>
            <div class="sweet-message"></div>
            <div class="age-counter" aria-live="polite"></div>
        </section>

        <section class="lovely-section card" aria-label="Joy Section">
            <div class="love-note">
                Dumdum, may your days be as wholesome as you are..
            </div>
            <button class="lovely-btn" onclick="makeFlowersRain()" aria-label="Bloom with Joy">
                💕 Click this button 
            </button>
        </section>
        
        <section class="birthday-wishes card" aria-label="Birthday Wishes">
            <div class="birthday-cake" aria-hidden="true"></div>
            <button class="lovely-btn" onclick="showLoveMessage(this)" style="font-size: 1.2em; margin-top: 18px;" aria-label="Special Message">
                <div class="notification-badge" aria-hidden="true">1</div>
                🌸 You have received a Message
            </button>
            <div class="signature">
                <i>Hugs</i>,<br>
                Anuj 🦋
            </div>
        </section>
    </main>

    <script>
        const isMobile = () => window.innerWidth <= 768;

        document.addEventListener('DOMContentLoaded', () => {
            const particleContainer = document.getElementById('particle-container');
            const PARTICLE_COUNT = isMobile() ? 20 : 40;
            const particlePool = [];

            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particleContainer.appendChild(particle);
                particlePool.push(particle);
            }

            function animateParticle(config) {
                const particle = particlePool.find(p => !p.classList.contains('animate'));
                if (!particle) return; 

                // Reset and configure
                particle.className = `particle ${config.type} animate`;
                particle.innerHTML = config.content || '';
                particle.style.backgroundColor = config.color || '';
                particle.style.left = `${Math.random() * 100}%`;
                
                const duration = Math.random() * config.durationRange + config.durationMin;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${Math.random() * 0.5}s`;

                const onAnimationEnd = () => {
                    particle.classList.remove('animate');
                    particle.removeEventListener('animationend', onAnimationEnd);
                };
                particle.addEventListener('animationend', onAnimationEnd);
            }

            window.makeFlowersRain = () => {
                const flowers = ['🌸', '🌺', '🌻', '🌷', '🌹', '💐', '🌼', '🦋', '🌿'];
                const count = isMobile() ? 10 : 20;
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        animateParticle({
                            type: 'emoji-rain',
                            content: flowers[Math.floor(Math.random() * flowers.length)],
                            durationRange: 3,
                            durationMin: 4
                        });
                    }, i * 100);
                }
            }

            function createGentleConfetti(count) {
                const colors = ['#9fafa0', '#d4a8a8', '#f8f5f3', '#f5deb3', '#fceaea'];
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        animateParticle({
                            type: 'confetti-piece',
                            color: colors[Math.floor(Math.random() * colors.length)],
                            durationRange: 4,
                            durationMin: 5
                        });
                    }, i * 100);
                }
            }

            function createButterflies(count) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        animateParticle({
                            type: 'floating-butterfly',
                            content: '🦋',
                            durationRange: 4,
                            durationMin: 8
                        });
                    }, i * 2000);
                }
            }

            window.showLoveMessage = (buttonElement) => {
                // Hide the notification badge on click
                const badge = buttonElement.querySelector('.notification-badge');
                if (badge) {
                    badge.style.opacity = '0';
                }

                createGentleConfetti(isMobile() ? 15 : 25);
                createButterflies(isMobile() ? 1 : 2);
                
                const messages = ["🦋 Hi!!! Sheetal. Umm.. you are such a rare and beautiful soul. You brighten everyone's day and um, the world feels like a better place because you're in it 💕 OMGGG"];
                const randomMessage = messages[0];

                let popup = document.querySelector('.special-message-popup');
                if (!popup) {
                    popup = document.createElement('div');
                    popup.className = 'special-message-popup';
                    document.body.appendChild(popup);
                }
                
                popup.innerHTML = `
                    ${randomMessage}
                    <br><br>
                    <button onclick="this.parentElement.style.display='none'" aria-label="Close popup">💕 Yes I'm smiling!</button>
                `;
                popup.style.display = 'block';
            }

            // --- Scroll-triggered Card Loading ---
            const cards = document.querySelectorAll('.card');
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15 
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        // Apply a staggered delay for a nicer effect
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, index * 150);
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            cards.forEach(card => {
                observer.observe(card);
            });

            // --- Auto-start effects ---
            setTimeout(makeFlowersRain, 1500);
            setTimeout(() => createButterflies(isMobile() ? 1 : 2), 3000);
            
            // Reduced frequency background effects
            setInterval(() => createGentleConfetti(isMobile() ? 1 : 3), 18000);
            setInterval(() => createButterflies(1), 25000);
        });
    </script>
</body>
</html>
