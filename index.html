<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>hbd roll no 69</title>
    <style>
body {
    background-color: #F8F1E5; /* Ivory */
    color: #4A4A4A; /* Charcoal Gray */
    font-family: 'Arial', sans-serif;
    text-align: center;
    padding: 50px;
    margin: 0;
}
h1 {
    font-size: 3em;
    color: #8B5E3C; /* Mocha */
}
h2 {
    color: #C2A878; /* Muted Gold */
    font-size: 2em;
}
.input-container input {
    background-color: #FFF5EE; /* Seashell */
    border: 2px solid #C2A878; /* Muted Gold */
    padding: 10px;
    font-size: 1em;
    width: 300px;
    border-radius: 5px;
}
.input-container button {
    background-color: #C2A878; /* Muted Gold */
    color: #F8F1E5; /* Ivory */
    border: none;
    padding: 10px 20px;
    font-size: 1em;
    border-radius: 5px;
    cursor: pointer;
}
.input-container button:hover {
    background-color: #A08C6E; /* Darker shade of Muted Gold */
}
.messages-display {
    margin-top: 30px;
    font-size: 1.2em;
    color: #708090; /* Slate Gray */
}

    </style>
</head>
<body>
    <h1 id="birthdayMessage">
        <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
        <span> </span>
        <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span>
        <span> </span>
        <span>S</span><span>u</span><span>d</span><span>h</span><span>a</span><span>n</span><span>s</span><span>h</span><span>u</span><span>!</span>
    </h1>
    <h2>The Legend turns 24 today</h2>
    <div class="image-container">
        <img src="1.jpg" alt="Sudhanshu's Funny Moment 1">
        <img src="2.jpg" alt="Sudhanshu's Funny Moment 2">
        <img src="3.jpg" alt="Sudhanshu's Funny Moment 3">
    </div>
    <div class="input-container">
        <button id="addMessageButton" onclick="moveButtonRandomly()">Click To Add A Message</button>
    </div>
    <div class="messages-display" id="messagesDisplay">

    </div>

    <script>
        function moveButtonRandomly() {
            const button = document.getElementById('addMessageButton');
            const inputContainer = document.querySelector('.input-container');
            const containerRect = inputContainer.getBoundingClientRect();
            const buttonRect = button.getBoundingClientRect();

            const maxX = containerRect.width - buttonRect.width;
            const maxY = containerRect.height - buttonRect.height;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            button.style.left = `${randomX}px`;
            button.style.top = `${randomY}px`;
        }

        window.onload = function() {
            const letters = document.querySelectorAll('#birthdayMessage span');
            letters.forEach((letter, index) => {
                letter.style.animationDelay = `${index * 0.6}s`;
            });
        };
    </script>
</body>
</html>
