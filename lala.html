<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 22nd Birthday, Mohit!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .marvel-red { color: #ED1D24; }
        .bg-marvel-red { background-color: #ED1D24; }
        .border-marvel-red { border-color: #ED1D24; }
        .font-bangers { font-family: 'Bangers', cursive; }
        .font-inter { font-family: 'Inter', sans-serif; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-down { animation: fadeInDown 1s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 1s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-black text-white font-inter">

<div class="container mx-auto px-4 py-8 md:py-16">

    <header class="text-center mb-12 fade-in-down">
        <div class="bg-marvel-red inline-block px-6 sm:px-8 py-2 mb-4">
            <h1 class="text-3xl sm:text-4xl md:text-7xl font-bangers tracking-wider text-white">HAPPY 22ND BIRTHDAY</h1>
        </div>
        <h2 class="text-5xl sm:text-6xl md:text-9xl font-bangers marvel-red tracking-widest">MOHIT!</h2>
    </header>

    <section class="max-w-3xl mx-auto text-center mb-16 fade-in-up" style="animation-delay: 0.2s;">
        <p class="text-lg sm:text-xl md:text-2xl leading-relaxed">
            You are more than just a friend, you are a family... you are a brother to me..
        </p>
    </section>

    <section class="mb-16">
        <h3 class="text-3xl md:text-5xl font-bangers text-center marvel-red mb-12 fade-in-up" style="animation-delay: 0.4s;">Marvel and WWE</h3>
        <div class="relative w-full max-w-4xl mx-auto h-[500px] sm:h-[550px] md:h-[600px] fade-in-up" style="animation-delay: 0.6s;">
            <div class="absolute top-2 left-1 w-[45%] transform -rotate-6 transition-transform duration-300 hover:scale-110 hover:rotate-0 hover:z-30 sm:top-0 sm:left-0 sm:w-2/5 sm:-rotate-12">
                <img src="ir.png" alt="Iron Man Flying" class="shadow-2xl border-4 border-transparent object-contain" style="filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));" onerror="this.onerror=null;this.src='ir.png';">
            </div>
            <div class="absolute top-1 right-1 w-[35%] transform rotate-3 transition-transform duration-300 hover:scale-110 hover:rotate-0 hover:z-30 z-10 sm:top-5 sm:right-5 sm:w-1/3 sm:rotate-6">
                <img src="#" alt="WWE Wrestler Posing" class="rounded-lg shadow-2xl border-4 border-white object-cover" onerror="this.onerror=null;this.src='th.png';">
            </div>
            <div class="absolute bottom-12 left-1/4 w-1/2 transform rotate-2 transition-transform duration-300 hover:scale-110 hover:rotate-0 hover:z-30 z-20 sm:bottom-10 sm:left-1/4 sm:w-1/2 sm:rotate-3">
                <img src="#" alt="Thanos Action Figure" class="rounded-lg shadow-2xl border-4 border-white object-cover" onerror="this.onerror=null;this.src='sp.png';">
            </div>
            <div class="absolute bottom-2 right-1 w-[45%] transform -rotate-3 transition-transform duration-300 hover:scale-110 hover:rotate-0 hover:z-30 sm:bottom-0 sm:right-0 sm:w-2/5 sm:-rotate-6">
                <img src="#" alt="WWE Wrestling Match" class="rounded-lg shadow-2xl border-4 border-white object-cover" onerror="this.onerror=null;this.src='ca.png';">
            </div>
        </div>
    </section>

    <section class="text-center mt-20 mb-12 fade-in-up" style="animation-delay: 1.4s;">
        <div class="max-w-md mx-auto">
            <img src="ww.png" alt="WWE Ring from above" class="w-40 h-40 object-cover rounded-full mx-auto mb-6 border-4 border-marvel-red shadow-lg" onerror="this.onerror=null;this.src='ww.png';">
        </div>
        <h3 class="text-2xl md:text-4xl font-bangers marvel-red mb-4">I'll be by your side :)</h3>
        <p class="text-lg md:text-xl"><i>Hugs</i>, Anuj</p>
    </section>

    <footer class="text-center text-gray-500 pt-8 border-t border-gray-800">
        <p>Cheers to 22 years, man.</p>
    </footer>

</div>

</body>
</html>
